[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///./anvora.db

[post_write_hooks]

[loggers]
keys = root,sentinel,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sentinel]
level = WARN
handlers = console
qualname = sentinel

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
